# AI Trading Bot v2 - 기본 설정
# ================================
# 목표: 일 1% 수익률, 손익비 2:1 기준 최적화

# 트레이딩 기본 설정
trading:
  initial_capital: 10000000      # 초기 자본금 (1000만원)
  market: KRX                    # 시장 (KRX, NASDAQ, NYSE)

  # 거래 시간대
  enable_pre_market: true        # 프리장 (08:00~08:50)
  enable_next_market: true       # 넥스트장 (15:30~20:00)
  pre_market_slippage_buffer_pct: 3.0  # 프리장 익절 슬리피지 버퍼(%): indicative vs 실제 단일가 갭 대비

  # 수수료 (한국투자증권 기준, 2024년 세율 적용)
  fees:
    buy_rate: 0.00015            # 매수 수수료 0.015%
    sell_rate: 0.00195           # 매도 수수료 0.015% + 증권거래세 0.18%

  # 슬리피지
  slippage:
    expected_ticks: 1
    max_ticks: 3


# 리스크 관리 설정 (일 1% 목표 최적화)
risk:
  # === 일일 한도 ===
  daily_max_loss_pct: 5.0        # 하루 최대 손실 5% (3→5: 스윙 변동성 허용)
  daily_max_trades: 10           # 일일 최대 거래 10회 (50→10: 스윙 매매 빈도)

  # === 포지션 관리 (진짜 스윙 전략: 집중 투자) ===
  base_position_pct: 25.0        # 기본 포지션 비율 25% (18→25: 스윙 집중 투자)
  max_position_pct: 28.0         # 최대 포지션 비율 28% (35→28: 단일 종목 오버 방지, Half-Kelly 상한)
  max_positions: 7               # 최대 동시 포지션 7개
  min_cash_reserve_pct: 5.0      # 최소 현금 보유 5%
  min_position_value: 200000     # 최소 포지션 금액 (20만원)
  dynamic_max_positions: true    # 자산 규모에 따라 max_positions 동적 조정
  flex_extra_positions: 2        # 여유자금 시 추가 허용 슬롯 수 (0=비활성화)
  flex_cash_threshold_pct: 5.0   # 현금이 총자산의 N% 이상이면 슬롯 추가
  max_positions_per_sector: 3    # 동일 섹터 최대 포지션 수 (0=제한없음)

  # === 손절/익절 (R:R 비율 2:1 목표) ===
  default_stop_loss_pct: 4.0     # 기본 손절 4.0% (8→4: 손실 크기 축소)
  default_take_profit_pct: 10.0  # 기본 익절 10.0% (20→10: 현실적 목표)
  trailing_stop_pct: 2.5         # 트레일링 스탑 2.5% (5→2.5: 이익 보호 강화)

  # === 특별 상황 ===
  hot_theme_position_pct: 50.0   # 핫 테마 시 최대 포지션 50% (70→50: 테마 집중 리스크 완화)
  momentum_multiplier: 1.5       # 강한 모멘텀 시 배팅 증가

  # === 하이브리드 전략 (타임 호라이즌별 자금 배분) ===
  hybrid:
    enabled: false              # 스윙 전용이므로 비활성화
    day_trading_pct: 20.0       # 데이 트레이딩 자금 20%
    short_term_pct: 30.0        # 단기 전략 자금 30%
    swing_pct: 50.0             # 스윙 전략 자금 50%

    # 타임 호라이즌별 포지션 크기
    day_base_position_pct: 10.0         # 데이: 작은 포지션 (빠른 회전)
    short_term_base_position_pct: 15.0  # 단기: 중간 포지션
    swing_base_position_pct: 18.0       # 스윙: 큰 포지션 (집중 투자)

    day_max_position_pct: 20.0          # 데이: 최대 20%
    short_term_max_position_pct: 30.0   # 단기: 최대 30%
    swing_max_position_pct: 35.0        # 스윙: 최대 35%


# 전략 설정
strategies:
  # 전략 공통 기본값 (각 전략은 이 값을 상속하고, 필요 시 오버라이드)
  defaults:
    holding_period_days: 3       # 기본 보유 기간 (단기)
    stop_loss_pct: 4.0           # 기본 손절 (4%: R:R 개선)
    take_profit_pct: 10.0        # 기본 익절 (10%: 현실적 목표)
    trailing_stop_pct: 2.5       # 기본 트레일링 스탑
    min_volume_ratio: 2.0        # 기본 거래량 비율
    min_score: 60.0              # 기본 최소 신호 점수
    position_size_multiplier: 1.0  # 기본 포지션 크기 배율

  # 모멘텀 브레이크아웃 (비활성화 - 스윙 전환)
  momentum_breakout:
    enabled: false
    time_horizon: swing          # 타임 호라이즌: 스윙 (50% 자금 풀)
    holding_period_days: 3       # 목표 보유 기간 3일 (현실적 단기)
    breakout_period: 20          # 돌파 기준 기간 (일)
    confirm_candles: 2           # 돌파 확인 캔들 수
    min_breakout_pct: 0.8        # 최소 돌파 비율 (1.5→0.8: 진입 기회 확대)
    volume_surge_ratio: 2.5      # 거래량 급증 기준 (3.5→2.5: 적정 수준)

    # 점수 가중치
    weight_price_momentum: 40.0
    weight_volume_momentum: 30.0
    weight_high_proximity: 20.0
    weight_theme: 10.0

    # 청산 조건 (R:R 비율 개선)
    stop_loss_pct: 4.0           # 8→4: 손실 축소
    take_profit_pct: 10.0        # 20→10: 현실적 목표
    trailing_stop_pct: 3.0       # 7→3: 수익 보호 강화

  # 테마 추종 (비활성화 - 스윙 전환)
  theme_chasing:
    enabled: false
    time_horizon: short_term     # 타임 호라이즌: 단기 (30% 자금 풀)
    holding_period_days: 2       # 목표 보유 기간 2일 (테마는 빠르게)
    min_theme_score: 70
    entry_window_minutes: 30
    stop_loss_pct: 3.0           # 6→3: 테마 실패 시 빠른 손절
    take_profit_pct: 8.0         # 15→8: 현실적 목표
    trailing_stop_pct: 2.0       # 3→2: 빠른 수익 보호

  # 갭상승 추종 (비활성화 - 스윙 전환)
  gap_and_go:
    enabled: false
    time_horizon: short_term     # 타임 호라이즌: 단기 (30% 자금 풀) — 스윙→단기
    holding_period_days: 2       # 목표 보유 기간 2일 (갭 모멘텀은 빠르게 소진)
    min_gap_pct: 2.0
    max_gap_pct: 10.0
    entry_delay_minutes: 20      # 30→20: 빠른 진입 (갭 모멘텀 활용)
    pullback_pct: 0.8            # 1.0→0.8: 빠른 눌림목 포착
    min_volume_ratio: 2.5        # 2.8→2.5: 적정 수준
    stop_loss_pct: 3.0           # 8→3: 갭 실패 시 빠른 손절
    take_profit_pct: 8.0         # 20→8: 현실적 목표
    trailing_stop_pct: 2.0       # 7→2: 수익 보호 강화

  # 평균 회귀 (급락 반등, 보조 전략)
  mean_reversion:
    enabled: false  # 보호 모드: 비활성화
    time_horizon: day            # 타임 호라이즌: 데이 (20% 자금 풀)
    holding_period_days: 1       # 목표 보유 기간 1일 (데이 트레이딩)
    max_rsi: 30.0
    min_decline_pct: -10.0
    min_volume_ratio: 1.5
    stop_loss_pct: 3.0           # 유지: 역추세 특성상 넓은 SL 필요
    take_profit_pct: 5.0
    trailing_stop_pct: 2.0       # 데이 트레이딩: 빠른 청산
    position_size_multiplier: 0.5  # 포지션 절반 (역추세 리스크 관리)

  # RSI-2 역추세 전략 (스윙 주력 60%)
  rsi2_reversal:
    enabled: true
    rsi_period: 2
    rsi_entry: 10                  # RSI < 10 매수
    rsi_exit: 70                   # RSI > 70 매도
    ma_trend_period: 200
    bb_period: 20
    bb_std: 2.0
    stop_loss_pct: 5.0
    max_holding_days: 10
    min_score: 65
    weight: 60                     # 자금 배분 60%

  # 미너비니 SEPA 트렌드 전략 (스윙 보조 40%)
  sepa_trend:
    enabled: true
    stop_loss_pct: 5.0
    max_holding_days: 10
    min_score: 60                  # 설계 원래 의도 (코드 주석: "min_score 60 기준 충분한 변별력")
                                   # 70으로 올렸을 때 프리장 수급데이터 미존재 시 전 종목 탈락 현상
    weight: 40                     # 자금 배분 40%


# 브로커 설정
broker:
  type: kis                      # kis, alpaca, ib
  kis:
    env: prod                    # prod, dev (모의투자)
    timeout_seconds: 15


# 데이터 설정
data:
  realtime_source: rest_polling       # kis_websocket → rest_polling (스윙 전환)

  storage:
    type: file
    file_path: ./data/prices

  history:
    lookback_days: 60
    cache_enabled: true


# 로깅 설정
logging:
  level: INFO
  file_enabled: true
  file_path: ./logs
  rotation: 1 day
  retention: 7 days


# 알림 설정
notification:
  telegram:
    enabled: true

  alerts:
    on_signal: false
    on_order: false
    on_fill: false
    on_risk_alert: false
    on_daily_summary: true


# 분할 익절 관리자 (3단계 익절 + ATR 기반 동적 손절)
exit_manager:
  enable_partial_exit: true

  # 3단계 익절 시스템 (R:R 비율 2:1 목표)
  first_exit_pct: 5.0             # 1차 익절 +5% (3→5: 스윙 목표 상향)
  first_exit_ratio: 0.30          # 30% 매도
  second_exit_pct: 10.0           # 2차 익절 +10% (6→10: 스윙 목표 상향)
  second_exit_ratio: 0.40         # 잔여 70%의 40% = 전체 28% 매도
  third_exit_pct: 15.0            # 3차 익절 +15% (10→15: 스윙 목표 상향)
  third_exit_ratio: 0.5           # 잔여 42%의 50% = 전체 21% 매도 (나머지 21%는 trailing)

  # ATR 기반 동적 손절 (변동성 대응)
  stop_loss_pct: 5.0              # 기본 손절 5.0% (4→5: 스윙 변동성 허용)
  enable_dynamic_stop: true       # ATR 기반 동적 손절 활성화
  atr_multiplier: 2.0             # ATR × 2.0
  min_stop_pct: 4.0               # 최소 손절폭 4.0% (3→4: 스윙 변동성 허용)
  max_stop_pct: 7.0               # 최대 손절폭 7.0% (6→7: 스윙 허용폭 확대)

  # 트레일링 스탑
  trailing_stop_pct: 3.0          # 고점 대비 하락률 3.0% (2.5→3: 스윙 하락 허용)
  trailing_activate_pct: 5.0      # 트레일링 활성화 5% (3→5: 스윙 활성화 기준 상향)

  include_fees: true


# 배치 분석 설정 (스윙 모멘텀)
batch:
  # 아침 스캔 모드 (true: 08:20 전일종가+US오버나이트 기반 스캔, 15:40/19:30 비활성화)
  morning_scan_enabled: true
  morning_scan_time: "08:20"         # 아침 스캔 시간 (장 전 08:00~08:50 사이 권장)
  daily_scan_time: "15:40"           # 전일 마감 후 스캔 (morning_scan_enabled=false 시만 사용)
  execute_time: "09:01"              # 시그널 실행 시간
  position_update_interval: 30       # 포지션 시세 갱신 간격 (분)
  max_entry_slippage_pct: 3.0        # 분석가 대비 최대 3% 상승까지 진입 허용
  max_holding_days: 10               # 최대 보유일수
  # 넥스트장 2차 스캔 (저녁 보정)
  evening_scan_enabled: true         # 19:30 넥스트장 반영 2차 스캔 활성화
  evening_scan_time: "19:30"         # 2차 스캔 시간
  evening_scan:
    ovtm_vol_threshold: 0.01         # 정규장 대비 시간외 거래량 최소 1% (의미있는 수급)
    price_bonus_pct: 2.0             # 시간외 +2% 이상 + 거래량 충족 → 스코어 보너스
    price_penalty_pct: -3.0          # 시간외 -3% 이하 → 스코어 패널티
    gap_remove_pct: 8.0              # 시간외 +8% 이상 갭업 → 제거 (다음날 고점 위험)
    score_bonus: 10.0                # 보너스 점수
    score_penalty: -15.0             # 패널티 점수
    min_score_after: 60.0            # 보정 후 최소 점수 (미달 시 제거)


# 종목 스크리너
screener:
  scan_interval_minutes: 5        # 스캔 주기 5분 (10→5: 기회 빠른 포착)
  min_volume_ratio: 2.0
  min_change_pct: 1.0
  max_change_pct: 15.0
  min_trading_value: 100000000    # 최소 거래대금 1억원 (유동성 확보)
  min_market_cap: 1000


# 테마 탐지기
theme_detector:
  scan_interval_minutes: 10       # 테마 스캔 10분 (15→10: 테마 초기 포착)
  min_news_count: 3
  min_theme_score: 70.0


# US 시장 오버나이트 시그널
us_market:
  enabled: true
  fetch_time: "07:30"
  cache_ttl_hours: 24


# 자가 진화 엔진
evolution:
  enabled: true
  analysis_days: 7
  min_trades_for_evolution: 5
  min_confidence_to_apply: 0.6
  auto_rollback_threshold: -2.0
  evaluation_period_days: 7
  send_telegram: false


# 코드 자동 진화 (Claude Code CLI)
code_evolution:
  enabled: true                    # 🟢 활성화 (코드 자동 개선)
  schedule_daily: true             # 매일 실행 (true) or 주간 실행 (false)
  schedule_hour: 18                # 실행 시각 (24시간, 18=오후 6시)
  schedule_day: 5                  # 주간 실행 시 요일 (0=월 ~ 6=일, 5=토)
  auto_merge: true                 # 🟢 자동 머지 (true=검증 통과 시 자동 머지+재시작)
  max_changed_files: 10            # 최대 변경 파일 수
  claude_timeout: 300              # Claude CLI 타임아웃 (초)


# 종목 마스터
stock_master:
  enabled: true
  refresh_time: "18:00"              # 일일 갱신 시간
  skip_weekends: true                # 주말 갱신 스킵

  # 추가 설정
  auto_initial_refresh: true         # 빈 테이블 시 자동 갱신
  cache_ttl_hours: 24                # 캐시 TTL (시간)
  alert_on_consecutive_failures: 3   # N일 연속 실패 시 알림


# 스케줄러 설정
scheduler:
  morning_report_time: "08:00"
  evening_report_time: "16:00"
  evolution_time: "20:30"
  nxt_refresh_hour: 6
  news_impact_threshold: 5
  # 일봉 데이터 갱신
  candle_refresh_times: ["15:40", "20:40"]  # 정규장/넥스트장 마감 후
  candle_refresh_max_symbols: 50            # 1회 최대 갱신 종목 수
  candle_refresh_skip_weekends: true        # 주말 스킵 여부


# 대시보드 설정
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080


# 워치리스트 (모니터링 종목)
