  - "051910"  # LG화학
  - "006400"  # 삼성SDI
  - "028260"  # 삼성물산
  - "207940"  # 삼성바이오로직스
  - "068270"  # 셀트리온
  - "096770"  # SK이노베이션
  - "003670"  # 포스코퓨처엠
  - "034730"  # SK

  # 주요 ETF
  - "069500"  # KODEX 200
